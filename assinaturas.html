<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lord of Barba — Assinaturas</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', sans-serif; background: #0f0f0f; color: #f0f0f0; min-height: 100vh; }

  header { background: #1a1a1a; border-bottom: 2px solid #c9a84c; padding: 20px 32px; display: flex; align-items: center; gap: 16px; }
  header h1 { font-size: 1.4rem; font-weight: 700; color: #c9a84c; }
  header span { font-size: 0.85rem; color: #888; }
  .nav { display: flex; gap: 12px; margin-left: auto; }
  .nav a { font-size: 0.82rem; color: #888; text-decoration: none; padding: 6px 14px; border-radius: 8px; border: 1px solid #2a2a2a; }
  .nav a:hover { color: #c9a84c; border-color: #c9a84c; }
  .nav a.active { color: #c9a84c; border-color: #c9a84c; background: #1f1a0f; }

  .container { padding: 24px 32px; }

  /* HERO CONTADOR */
  .hero { background: linear-gradient(135deg, #1a1a1a 0%, #1f1a0f 100%); border: 1px solid #c9a84c33; border-radius: 16px; padding: 32px; margin-bottom: 24px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 24px; }
  .hero-num { display: flex; align-items: baseline; gap: 12px; }
  .hero-num .big { font-size: 5rem; font-weight: 900; color: #c9a84c; line-height: 1; }
  .hero-num .label { font-size: 1.1rem; color: #888; }
  .hero-lista { display: flex; flex-direction: column; gap: 6px; }
  .hero-lista .item { font-size: 0.85rem; color: #ccc; display: flex; align-items: center; gap: 8px; }
  .hero-lista .item::before { content: ''; width: 6px; height: 6px; border-radius: 50%; background: #c9a84c; flex-shrink: 0; }
  .hero-mrr { text-align: right; }
  .hero-mrr .mrr-label { font-size: 0.75rem; color: #888; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
  .hero-mrr .mrr-val { font-size: 2rem; font-weight: 800; color: #4caf88; }
  .hero-mrr .mrr-sub { font-size: 0.75rem; color: #666; margin-top: 2px; }

  /* CARDS */
  .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; margin-bottom: 24px; }
  .card { background: #1a1a1a; border-radius: 12px; padding: 18px 20px; border: 1px solid #2a2a2a; }
  .card .label { font-size: 0.72rem; color: #888; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
  .card .valor { font-size: 1.5rem; font-weight: 700; }
  .card.verde .valor { color: #4caf88; }
  .card.amarelo .valor { color: #c9a84c; }
  .card.azul .valor { color: #5ab4e0; }
  .card.vermelho .valor { color: #e05a5a; }
  .card .sub { font-size: 0.72rem; color: #666; margin-top: 4px; }

  .box { background: #1a1a1a; border-radius: 12px; padding: 20px; border: 1px solid #2a2a2a; margin-bottom: 20px; }
  .box h3 { font-size: 0.85rem; color: #888; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 16px; }

  /* ALERTAS */
  .alerta { display: flex; align-items: center; gap: 14px; padding: 14px 16px; border-radius: 10px; margin-bottom: 8px; border: 1px solid #2a2a2a; }
  .alerta.hoje { border-color: #e05a5a44; background: #1a0f0f; }
  .alerta.amanha { border-color: #e08a3a44; background: #1a140f; }
  .alerta.semana { border-color: #c9a84c44; background: #141209; }
  .alerta-dia { font-size: 1.6rem; font-weight: 900; min-width: 44px; text-align: center; }
  .alerta.hoje .alerta-dia { color: #e05a5a; }
  .alerta.amanha .alerta-dia { color: #e08a3a; }
  .alerta.semana .alerta-dia { color: #c9a84c; }
  .alerta-info { flex: 1; }
  .alerta-nome { font-weight: 600; font-size: 0.9rem; }
  .alerta-sub { font-size: 0.75rem; color: #888; margin-top: 2px; }
  .alerta-right { display: flex; flex-direction: column; align-items: flex-end; gap: 5px; }
  .alerta-valor { font-weight: 700; color: #4caf88; font-size: 0.95rem; }
  .tag { font-size: 0.7rem; padding: 2px 8px; border-radius: 20px; font-weight: 700; }
  .tag.hoje { background: #3a1a1a; color: #e05a5a; }
  .tag.amanha { background: #3a2a1a; color: #e08a3a; }
  .tag.semana { background: #2a2218; color: #c9a84c; }
  .sem-alerta { color: #555; font-size: 0.85rem; text-align: center; padding: 20px; }

  /* TABELA */
  .tabela-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
  thead tr { background: #222; }
  th { padding: 10px 12px; text-align: left; color: #888; font-weight: 600; text-transform: uppercase; font-size: 0.7rem; letter-spacing: 0.5px; white-space: nowrap; }
  td { padding: 11px 12px; border-bottom: 1px solid #1e1e1e; white-space: nowrap; vertical-align: middle; }
  tr:hover td { background: #1c1c1c; }

  .num-circle { display: inline-flex; align-items: center; justify-content: center; width: 26px; height: 26px; border-radius: 50%; background: #2a2a2a; color: #c9a84c; font-weight: 700; font-size: 0.78rem; border: 1px solid #3a3a3a; }
  .badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 0.72rem; font-weight: 700; }
  .badge.ativo { background: #1a3a2a; color: #4caf88; }
  .badge.cancelado { background: #3a1a1a; color: #e05a5a; }
  .tel { color: #5ab4e0; }
  .nenhum { text-align: center; padding: 32px; color: #555; }

  @media(max-width: 600px) {
    .container { padding: 16px; }
    .hero { padding: 20px; }
    .hero-num .big { font-size: 3.5rem; }
    header { padding: 16px; }
  }
</style>
</head>
<body>

<header>
  <div>
    <h1>✂️ Lord of Barba</h1>
    <span>Assinaturas</span>
  </div>
  <nav class="nav">
    <a href="dashboard.html">Financeiro</a>
    <a href="assinaturas.html" class="active">Assinaturas</a>
  </nav>
</header>

<div class="container">

  <!-- HERO -->
  <div class="hero">
    <div class="hero-num">
      <div class="big" id="hero-total">0</div>
      <div class="label">assinantes<br>ativos</div>
    </div>
    <div class="hero-lista" id="hero-lista"></div>
    <div class="hero-mrr">
      <div class="mrr-label">Receita Recorrente Mensal</div>
      <div class="mrr-val" id="hero-mrr">R$ 0,00</div>
      <div class="mrr-sub">MRR</div>
    </div>
  </div>

  <!-- CARDS -->
  <div class="cards">
    <div class="card azul">
      <div class="label">Total Cadastrados</div>
      <div class="valor" id="card-total">0</div>
      <div class="sub" id="card-ativos-sub"></div>
    </div>
    <div class="card amarelo">
      <div class="label">Vencem esta semana</div>
      <div class="valor" id="card-semana">0</div>
      <div class="sub" id="card-semana-val"></div>
    </div>
    <div class="card vermelho">
      <div class="label">Vencem hoje</div>
      <div class="valor" id="card-hoje">0</div>
      <div class="sub" id="card-hoje-val"></div>
    </div>
    <div class="card verde">
      <div class="label">Próx. Vencimento</div>
      <div class="valor" id="card-proximo">—</div>
      <div class="sub" id="card-proximo-nome"></div>
    </div>
  </div>

  <!-- ALERTAS -->
  <div class="box">
    <h3>Vencimentos Próximos — 7 dias</h3>
    <div id="alertas-lista"></div>
  </div>

  <!-- TABELA -->
  <div class="box">
    <h3>Assinantes <span id="total-count" style="color:#c9a84c;font-size:1rem;font-weight:700;"></span></h3>
    <div class="tabela-wrap">
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>Nome</th>
            <th>Telefone</th>
            <th>Início</th>
            <th>Próx. Vencimento</th>
            <th>Plano</th>
            <th>Valor</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
  </div>

</div>

<script>
const CLIENTES = [
  {Nome:"Wesley Henrique",    Telefone:"41995497154", DataInicio:"20/03/2026", ProxVenc:"20/04/2026", Plano:"Plano Lord Cabelo", Valor:74.90, Status:"ATIVO"},
  {Nome:"Weverton Henrique",  Telefone:"41998434846", DataInicio:"20/03/2026", ProxVenc:"20/04/2026", Plano:"Plano Lord Cabelo", Valor:74.90, Status:"ATIVO"},
  {Nome:"Joselyn Tamayo",     Telefone:"41996342151", DataInicio:"23/03/2026", ProxVenc:"23/04/2026", Plano:"Mensal",            Valor:74.90, Status:"ATIVO"},
  {Nome:"André Borges",       Telefone:"41999169705", DataInicio:"24/03/2026", ProxVenc:"24/04/2026", Plano:"Plano Lord Cabelo", Valor:74.90, Status:"ATIVO"}
];

function parseData(str) {
  const [d,m,a] = str.split('/');
  return new Date(`${a}-${m}-${d}T00:00:00`);
}
function fmt(v) {
  return 'R$ ' + parseFloat(v).toLocaleString('pt-BR', {minimumFractionDigits:2, maximumFractionDigits:2});
}
function fmtTel(t) {
  return t.replace(/(\d{2})(\d{5})(\d{4})/, '($1) $2-$3');
}
function diffDias(d) {
  const hoje = new Date(); hoje.setHours(0,0,0,0);
  return Math.round((d - hoje) / 86400000);
}

const ativos = CLIENTES.filter(c => c.Status === 'ATIVO');
const mrr = ativos.reduce((s,c) => s + c.Valor, 0);

// Hero
document.getElementById('hero-total').textContent = ativos.length;
document.getElementById('hero-mrr').textContent = fmt(mrr);
document.getElementById('hero-lista').innerHTML = ativos.map((c,i) =>
  `<div class="item"><strong style="color:#c9a84c">#${i+1}</strong> ${c.Nome} — ${fmt(c.Valor)}</div>`
).join('');

// Cards
document.getElementById('card-total').textContent = CLIENTES.length;
document.getElementById('card-ativos-sub').textContent = `${ativos.length} ativo(s)`;

const hoje_venc = ativos.filter(c => diffDias(parseData(c.ProxVenc)) === 0);
document.getElementById('card-hoje').textContent = hoje_venc.length;
document.getElementById('card-hoje-val').textContent = hoje_venc.length ? fmt(hoje_venc.reduce((s,c)=>s+c.Valor,0)) : 'nenhum';

const semana_venc = ativos.filter(c => { const d = diffDias(parseData(c.ProxVenc)); return d >= 0 && d <= 7; });
document.getElementById('card-semana').textContent = semana_venc.length;
document.getElementById('card-semana-val').textContent = semana_venc.length ? fmt(semana_venc.reduce((s,c)=>s+c.Valor,0)) : 'nenhum';

const sorted = [...ativos].sort((a,b) => parseData(a.ProxVenc) - parseData(b.ProxVenc));
if (sorted.length) {
  document.getElementById('card-proximo').textContent = sorted[0].ProxVenc.slice(0,5);
  document.getElementById('card-proximo-nome').textContent = sorted[0].Nome;
}

// Alertas
const alertasEl = document.getElementById('alertas-lista');
const proximos = ativos
  .map(c => ({...c, dias: diffDias(parseData(c.ProxVenc))}))
  .filter(c => c.dias >= 0 && c.dias <= 7)
  .sort((a,b) => a.dias - b.dias);

if (!proximos.length) {
  alertasEl.innerHTML = '<div class="sem-alerta">Nenhum vencimento nos próximos 7 dias</div>';
} else {
  alertasEl.innerHTML = proximos.map(c => {
    const cls = c.dias === 0 ? 'hoje' : c.dias === 1 ? 'amanha' : 'semana';
    const label = c.dias === 0 ? 'HOJE' : c.dias === 1 ? 'AMANHÃ' : `em ${c.dias} dias`;
    return `
    <div class="alerta ${cls}">
      <div class="alerta-dia">${c.ProxVenc.slice(0,2)}</div>
      <div class="alerta-info">
        <div class="alerta-nome">${c.Nome}</div>
        <div class="alerta-sub">${c.Plano} &bull; ${fmtTel(c.Telefone)}</div>
      </div>
      <div class="alerta-right">
        <div class="alerta-valor">${fmt(c.Valor)}</div>
        <span class="tag ${cls}">${label}</span>
      </div>
    </div>`;
  }).join('');
}

// Tabela
const totalAtivos = ativos.length;
document.getElementById('total-count').textContent = `— ${totalAtivos} ativo(s) de ${CLIENTES.length} cadastrado(s)`;
document.getElementById('tbody').innerHTML = CLIENTES.map((c,i) => {
  const dias = diffDias(parseData(c.ProxVenc));
  let vencStyle = 'color:#f0f0f0';
  if (dias === 0) vencStyle = 'color:#e05a5a;font-weight:700';
  else if (dias <= 3) vencStyle = 'color:#e08a3a;font-weight:700';
  else if (dias <= 7) vencStyle = 'color:#c9a84c;font-weight:700';
  const statusCls = c.Status === 'ATIVO' ? 'ativo' : 'cancelado';
  return `
  <tr>
    <td><span class="num-circle">${i+1}</span></td>
    <td style="font-weight:600">${c.Nome}</td>
    <td class="tel">${fmtTel(c.Telefone)}</td>
    <td style="color:#888">${c.DataInicio}</td>
    <td style="${vencStyle}">${c.ProxVenc}</td>
    <td style="color:#888">${c.Plano}</td>
    <td style="color:#4caf88;font-weight:700">${fmt(c.Valor)}</td>
    <td><span class="badge ${statusCls}">${c.Status}</span></td>
  </tr>`;
}).join('');
</script>
</body>
</html>
